<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- IT Team / Support Illustration -->
  <!-- Background shape -->
  <circle cx="250" cy="200" r="170" fill="white" opacity="0.05"/>
  <circle cx="250" cy="200" r="120" fill="white" opacity="0.03"/>

  <!-- Central globe / network -->
  <circle cx="250" cy="180" r="80" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="250" cy="180" rx="80" ry="30" stroke="white" stroke-width="1" opacity="0.15"/>
  <ellipse cx="250" cy="180" rx="30" ry="80" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- Server rack -->
  <rect x="60" y="100" width="70" height="100" rx="6" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="68" y="112" width="54" height="12" rx="3" fill="white" opacity="0.08"/>
  <circle cx="114" cy="118" r="3" fill="#22C55E" opacity="0.8"/>
  <rect x="68" y="130" width="54" height="12" rx="3" fill="white" opacity="0.08"/>
  <circle cx="114" cy="136" r="3" fill="#22C55E" opacity="0.8"/>
  <rect x="68" y="148" width="54" height="12" rx="3" fill="white" opacity="0.08"/>
  <circle cx="114" cy="154" r="3" fill="#3B82F6" opacity="0.8"/>
  <rect x="68" y="166" width="54" height="12" rx="3" fill="white" opacity="0.08"/>
  <circle cx="114" cy="172" r="3" fill="#22C55E" opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="130" y1="150" x2="170" y2="180" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="330" y1="180" x2="370" y2="140" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="250" y1="260" x2="250" y2="300" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>

  <!-- Laptop -->
  <rect x="370" y="110" width="80" height="55" rx="4" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="376" y="116" width="68" height="40" rx="2" fill="#3B82F6" opacity="0.15"/>
  <rect x="362" y="165" width="96" height="6" rx="3" fill="white" opacity="0.12"/>

  <!-- Dashboard on laptop -->
  <rect x="384" y="122" width="24" height="16" rx="2" fill="white" opacity="0.1"/>
  <rect x="414" y="122" width="24" height="8" rx="1" fill="white" opacity="0.08"/>
  <rect x="414" y="134" width="16" height="4" rx="1" fill="white" opacity="0.06"/>

  <!-- Monitor at bottom -->
  <rect x="200" y="295" width="100" height="70" rx="6" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="208" y="303" width="84" height="48" rx="3" fill="#3B82F6" opacity="0.12"/>
  <rect x="235" y="365" width="30" height="8" rx="2" fill="white" opacity="0.1"/>
  <rect x="220" y="373" width="60" height="4" rx="2" fill="white" opacity="0.1"/>

  <!-- Floating icons -->
  <!-- Shield -->
  <g transform="translate(180, 80)">
    <path d="M15 2 L28 8 L28 18 C28 27 15 32 15 32 C15 32 2 27 2 18 L2 8 Z" fill="#22C55E" opacity="0.3" stroke="#22C55E" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- Gear -->
  <g transform="translate(300, 80)">
    <circle cx="12" cy="12" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <circle cx="12" cy="12" r="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Wifi -->
  <g transform="translate(145, 50)">
    <path d="M10 18 C10 18 15 13 20 18" stroke="white" stroke-width="1.5" fill="none" opacity="0.2"/>
    <path d="M5 13 C5 13 15 3 25 13" stroke="white" stroke-width="1.5" fill="none" opacity="0.15"/>
    <circle cx="15" cy="20" r="2" fill="white" opacity="0.3"/>
  </g>

  <!-- Cloud -->
  <g transform="translate(320, 50)">
    <path d="M10 25 C5 25 0 20 5 15 C3 10 8 5 15 8 C18 2 28 2 30 8 C35 8 38 13 35 18 C38 22 35 25 30 25 Z" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  </g>

  <!-- Nodes on the globe -->
  <circle cx="200" cy="140" r="5" fill="#3B82F6" opacity="0.5"/>
  <circle cx="310" cy="160" r="5" fill="#22C55E" opacity="0.5"/>
  <circle cx="230" cy="230" r="5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="280" cy="130" r="5" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="190" cy="200" r="5" fill="#EC4899" opacity="0.5"/>
</svg>
