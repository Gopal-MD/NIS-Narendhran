<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- About / Company Illustration -->
  <!-- Background -->
  <circle cx="250" cy="200" r="180" fill="#EBF5FF" opacity="0.3"/>

  <!-- Office building -->
  <rect x="160" y="80" width="180" height="240" rx="8" fill="#0A2463"/>
  <rect x="155" y="70" width="190" height="15" rx="4" fill="#1E40AF"/>

  <!-- Windows grid -->
  <rect x="180" y="100" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="220" y="100" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.6"/>
  <rect x="260" y="100" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="300" y="100" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.3"/>

  <rect x="180" y="135" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.6"/>
  <rect x="220" y="135" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="260" y="135" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.5"/>
  <rect x="300" y="135" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.4"/>

  <rect x="180" y="170" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="220" y="170" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.5"/>
  <rect x="260" y="170" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="300" y="170" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.6"/>

  <rect x="180" y="205" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.5"/>
  <rect x="220" y="205" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="260" y="205" width="30" height="25" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="300" y="205" width="30" height="25" rx="3" fill="#60A5FA" opacity="0.5"/>

  <!-- Door -->
  <rect x="225" y="260" width="50" height="60" rx="4" fill="#1E40AF"/>
  <circle cx="268" cy="292" r="3" fill="#F59E0B"/>

  <!-- Ground -->
  <rect x="50" y="320" width="400" height="6" rx="3" fill="#0A2463" opacity="0.3"/>

  <!-- Left tower/antenna -->
  <rect x="70" y="150" width="50" height="170" rx="4" fill="#0A2463" opacity="0.6"/>
  <rect x="75" y="160" width="40" height="10" rx="2" fill="#3B82F6" opacity="0.3"/>
  <rect x="75" y="178" width="40" height="10" rx="2" fill="#3B82F6" opacity="0.3"/>
  <rect x="75" y="196" width="40" height="10" rx="2" fill="#3B82F6" opacity="0.3"/>
  <!-- Antenna -->
  <rect x="93" y="110" width="4" height="45" rx="2" fill="#0A2463"/>
  <circle cx="95" cy="105" r="6" fill="#22C55E" opacity="0.6"/>

  <!-- Right element - truck/van -->
  <rect x="370" y="280" width="70" height="40" rx="4" fill="#1E40AF"/>
  <rect x="350" y="290" width="25" height="30" rx="3" fill="#2563EB"/>
  <rect x="354" y="294" width="17" height="16" rx="2" fill="#93C5FD" opacity="0.4"/>
  <circle cx="370" cy="325" r="10" fill="#1A1A1A"/>
  <circle cx="370" cy="325" r="5" fill="#666"/>
  <circle cx="420" cy="325" r="10" fill="#1A1A1A"/>
  <circle cx="420" cy="325" r="5" fill="#666"/>

  <!-- NIS logo on van -->
  <text x="405" y="306" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white" opacity="0.8">NIS</text>

  <!-- People -->
  <!-- Person 1 -->
  <circle cx="140" cy="290" r="8" fill="#F59E0B"/>
  <rect x="133" y="300" width="14" height="20" rx="4" fill="#0A2463"/>

  <!-- Person 2 -->
  <circle cx="165" cy="293" r="8" fill="#3B82F6"/>
  <rect x="158" y="303" width="14" height="17" rx="4" fill="#0A2463"/>

  <!-- Floating elements -->
  <!-- WiFi signal -->
  <g transform="translate(85, 85)">
    <path d="M5 16 C5 16 10 11 15 16" stroke="#22C55E" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M1 11 C1 11 10 3 19 11" stroke="#22C55E" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Growth chart -->
  <g transform="translate(370, 200)">
    <rect x="0" y="20" width="50" height="40" rx="4" fill="white" opacity="0.9" stroke="#E5E7EB" stroke-width="1"/>
    <polyline points="8,48 18,38 28,42 38,28" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="38" cy="28" r="3" fill="#22C55E"/>
  </g>

  <!-- Stars / sparkles -->
  <circle cx="420" cy="100" r="3" fill="#F59E0B" opacity="0.6"/>
  <circle cx="60" cy="100" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="440" cy="170" r="2" fill="#22C55E" opacity="0.5"/>
</svg>
