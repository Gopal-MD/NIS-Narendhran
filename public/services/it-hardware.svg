<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background circles -->
  <circle cx="200" cy="150" r="130" fill="#EBF5FF" opacity="0.5"/>
  <circle cx="200" cy="150" r="90" fill="#D6EBFF" opacity="0.4"/>

  <!-- Monitor -->
  <rect x="100" y="60" width="200" height="140" rx="8" fill="#0A2463" stroke="#1A3A7A" stroke-width="2"/>
  <rect x="110" y="70" width="180" height="110" rx="4" fill="#2563EB"/>

  <!-- Screen content - grid of items -->
  <rect x="125" y="85" width="60" height="40" rx="3" fill="#60A5FA" opacity="0.6"/>
  <rect x="195" y="85" width="80" height="18" rx="2" fill="#93C5FD" opacity="0.5"/>
  <rect x="195" y="110" width="60" height="15" rx="2" fill="#93C5FD" opacity="0.3"/>
  <rect x="125" y="135" width="150" height="10" rx="2" fill="#93C5FD" opacity="0.3"/>
  <rect x="125" y="150" width="120" height="10" rx="2" fill="#93C5FD" opacity="0.2"/>

  <!-- Monitor stand -->
  <rect x="170" y="200" width="60" height="10" rx="2" fill="#0A2463"/>
  <rect x="150" y="210" width="100" height="8" rx="4" fill="#0A2463"/>

  <!-- Laptop on the side -->
  <rect x="280" y="150" width="80" height="55" rx="4" fill="#0A2463"/>
  <rect x="284" y="154" width="72" height="42" rx="2" fill="#3B82F6"/>
  <rect x="272" y="205" width="96" height="5" rx="2" fill="#1A3A7A"/>

  <!-- Keyboard -->
  <rect x="20" y="180" width="70" height="45" rx="6" fill="#0A2463"/>
  <rect x="26" y="186" width="18" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="48" y="186" width="18" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="26" y="196" width="18" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="48" y="196" width="18" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="26" y="206" width="40" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>

  <!-- USB / peripherals -->
  <rect x="310" y="230" width="40" height="20" rx="3" fill="#6366F1"/>
  <rect x="316" y="235" width="8" height="10" rx="1" fill="white" opacity="0.4"/>
  <rect x="328" y="235" width="8" height="10" rx="1" fill="white" opacity="0.4"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="100" r="4" fill="#2563EB" opacity="0.3"/>
  <circle cx="50" cy="120" r="3" fill="#2563EB" opacity="0.2"/>
  <circle cx="340" cy="100" r="4" fill="#2563EB" opacity="0.3"/>
  <circle cx="350" cy="130" r="3" fill="#2563EB" opacity="0.2"/>
</svg>
