<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background circles -->
  <circle cx="200" cy="150" r="130" fill="#EBF5FF" opacity="0.5"/>
  <circle cx="200" cy="150" r="90" fill="#D6EBFF" opacity="0.4"/>

  <!-- Printer body -->
  <rect x="100" y="80" width="200" height="120" rx="10" fill="#0A2463"/>
  <rect x="110" y="90" width="180" height="30" rx="4" fill="#1A3A7A"/>

  <!-- Paper feeder top -->
  <rect x="130" y="60" width="140" height="30" rx="4" fill="#1E40AF"/>

  <!-- Display panel -->
  <rect x="140" y="96" width="60" height="18" rx="3" fill="#3B82F6"/>
  <rect x="145" y="100" width="20" height="4" rx="1" fill="#93C5FD" opacity="0.5"/>
  <rect x="145" y="107" width="30" height="3" rx="1" fill="#93C5FD" opacity="0.3"/>

  <!-- Buttons -->
  <circle cx="220" cy="105" r="5" fill="#22C55E"/>
  <circle cx="240" cy="105" r="5" fill="#EF4444"/>
  <circle cx="260" cy="105" r="5" fill="#F59E0B"/>

  <!-- Paper output slot -->
  <rect x="120" y="130" width="160" height="8" rx="2" fill="#162046"/>

  <!-- Output paper -->
  <rect x="130" y="138" width="140" height="75" rx="2" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="145" y="150" width="80" height="4" rx="1" fill="#CBD5E1"/>
  <rect x="145" y="160" width="100" height="4" rx="1" fill="#CBD5E1"/>
  <rect x="145" y="170" width="60" height="4" rx="1" fill="#CBD5E1"/>
  <rect x="145" y="180" width="90" height="4" rx="1" fill="#CBD5E1"/>
  <rect x="145" y="190" width="70" height="4" rx="1" fill="#CBD5E1"/>

  <!-- Wrench tool icon -->
  <g transform="translate(320, 180) rotate(-45)">
    <rect x="0" y="0" width="8" height="40" rx="3" fill="#F59E0B"/>
    <circle cx="4" cy="0" r="10" fill="none" stroke="#F59E0B" stroke-width="4"/>
  </g>

  <!-- Ink cartridges -->
  <rect x="40" y="130" width="15" height="30" rx="3" fill="#06B6D4"/>
  <rect x="58" y="130" width="15" height="30" rx="3" fill="#EC4899"/>
  <rect x="40" y="165" width="15" height="30" rx="3" fill="#F59E0B"/>
  <rect x="58" y="165" width="15" height="30" rx="3" fill="#1A1A1A"/>
</svg>
