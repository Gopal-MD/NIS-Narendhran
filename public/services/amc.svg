<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background circles -->
  <circle cx="200" cy="150" r="130" fill="#EBF5FF" opacity="0.5"/>
  <circle cx="200" cy="150" r="90" fill="#D6EBFF" opacity="0.4"/>

  <!-- Clipboard / Contract -->
  <rect x="120" y="40" width="160" height="210" rx="8" fill="#0A2463"/>
  <rect x="128" y="48" width="144" height="194" rx="4" fill="white"/>

  <!-- Clipboard clip -->
  <rect x="160" y="30" width="80" height="25" rx="6" fill="#1E40AF"/>
  <circle cx="200" cy="38" r="6" fill="white"/>

  <!-- Contract text lines -->
  <rect x="148" y="70" width="104" height="8" rx="2" fill="#0A2463"/>
  <rect x="148" y="90" width="120" height="5" rx="1" fill="#CBD5E1"/>
  <rect x="148" y="102" width="100" height="5" rx="1" fill="#CBD5E1"/>
  <rect x="148" y="114" width="110" height="5" rx="1" fill="#CBD5E1"/>

  <!-- Checklist items -->
  <rect x="148" y="132" width="14" height="14" rx="3" stroke="#22C55E" stroke-width="2" fill="none"/>
  <path d="M151 139 l3 3 l6 -6" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="168" y="135" width="80" height="5" rx="1" fill="#CBD5E1"/>

  <rect x="148" y="155" width="14" height="14" rx="3" stroke="#22C55E" stroke-width="2" fill="none"/>
  <path d="M151 162 l3 3 l6 -6" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="168" y="158" width="90" height="5" rx="1" fill="#CBD5E1"/>

  <rect x="148" y="178" width="14" height="14" rx="3" stroke="#22C55E" stroke-width="2" fill="none"/>
  <path d="M151 185 l3 3 l6 -6" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="168" y="181" width="70" height="5" rx="1" fill="#CBD5E1"/>

  <!-- Signature line -->
  <rect x="148" y="210" width="100" height="1" fill="#0A2463"/>
  <text x="158" y="225" font-family="cursive, Arial" font-size="10" fill="#0A2463" opacity="0.5">Signature</text>

  <!-- Shield / protection badge -->
  <g transform="translate(300, 70)">
    <path d="M25 5 L45 15 L45 35 C45 50 25 60 25 60 C25 60 5 50 5 35 L5 15 Z" fill="#22C55E" opacity="0.9"/>
    <path d="M18 32 l5 5 l10 -12" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Calendar icon -->
  <g transform="translate(40, 140)">
    <rect x="0" y="5" width="50" height="45" rx="6" fill="#1E40AF"/>
    <rect x="0" y="5" width="50" height="15" rx="6" fill="#2563EB"/>
    <rect x="15" y="0" width="4" height="12" rx="2" fill="#0A2463"/>
    <rect x="31" y="0" width="4" height="12" rx="2" fill="#0A2463"/>
    <text x="25" y="42" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">12</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="330" cy="200" r="5" fill="#2563EB" opacity="0.3"/>
  <circle cx="350" cy="180" r="3" fill="#2563EB" opacity="0.2"/>
  <circle cx="60" cy="80" r="4" fill="#2563EB" opacity="0.3"/>
</svg>
