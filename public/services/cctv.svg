<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background circles -->
  <circle cx="200" cy="150" r="130" fill="#EBF5FF" opacity="0.5"/>
  <circle cx="200" cy="150" r="90" fill="#D6EBFF" opacity="0.4"/>

  <!-- Main camera body -->
  <rect x="140" y="80" width="120" height="80" rx="8" fill="#0A2463"/>
  <rect x="135" y="75" width="130" height="10" rx="3" fill="#1E40AF"/>

  <!-- Camera lens -->
  <circle cx="200" cy="120" r="28" fill="#1E40AF" stroke="#3B82F6" stroke-width="3"/>
  <circle cx="200" cy="120" r="18" fill="#0F172A"/>
  <circle cx="200" cy="120" r="10" fill="#3B82F6" opacity="0.3"/>
  <circle cx="200" cy="120" r="5" fill="#60A5FA" opacity="0.5"/>

  <!-- IR LEDs -->
  <circle cx="150" cy="95" r="4" fill="#EF4444" opacity="0.6"/>
  <circle cx="162" cy="95" r="4" fill="#EF4444" opacity="0.6"/>
  <circle cx="238" cy="95" r="4" fill="#EF4444" opacity="0.6"/>
  <circle cx="250" cy="95" r="4" fill="#EF4444" opacity="0.6"/>

  <!-- Status LED -->
  <circle cx="255" cy="145" r="3" fill="#22C55E"/>

  <!-- Camera mount bracket -->
  <rect x="186" y="160" width="28" height="20" rx="3" fill="#0A2463"/>
  <rect x="180" y="175" width="40" height="50" rx="2" fill="#1A3A7A"/>
  <rect x="170" y="225" width="60" height="8" rx="4" fill="#0A2463"/>

  <!-- Monitor showing feed -->
  <rect x="30" y="160" width="100" height="70" rx="6" fill="#0A2463"/>
  <rect x="36" y="166" width="88" height="52" rx="3" fill="#1E293B"/>
  <!-- Video feed lines -->
  <rect x="42" y="175" width="35" height="25" rx="2" fill="#3B82F6" opacity="0.3"/>
  <rect x="82" y="175" width="35" height="25" rx="2" fill="#3B82F6" opacity="0.3"/>
  <rect x="42" y="204" width="75" height="8" rx="1" fill="#334155"/>
  <!-- Recording indicator -->
  <circle cx="115" cy="172" r="3" fill="#EF4444"/>

  <!-- Shield / Security badge -->
  <g transform="translate(305, 100)">
    <path d="M30 5 L55 18 L55 40 C55 58 30 70 30 70 C30 70 5 58 5 40 L5 18 Z" fill="#2563EB" opacity="0.9"/>
    <path d="M20 38 l8 8 l14 -16" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Signal waves from camera -->
  <path d="M260 110 C270 105 275 100 280 105" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M263 115 C276 108 283 100 290 108" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="55" cy="130" r="4" fill="#2563EB" opacity="0.3"/>
  <circle cx="340" cy="200" r="5" fill="#2563EB" opacity="0.25"/>
  <circle cx="358" cy="225" r="3" fill="#2563EB" opacity="0.15"/>
</svg>
